name: flappy_bird_game
description: A Flappy Bird clone built with Flutter + Flame.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # Game engine
  flame: ^1.18.0
  flame_audio: ^2.10.0

  # Networking
  http: ^1.2.1

  # State management
  provider: ^6.1.2

  # Local high scores (mobile/desktop; web falls back to in-memory)
  sqflite: ^2.3.3
  path: ^1.9.0

  # Persist username + server URL on device
  shared_preferences: ^2.2.3

  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
